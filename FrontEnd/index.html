<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diabetes Predictor</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="app">

<div class="header">
<h1>Diabetes Predictor</h1>
<p>Sistema basado en Machine Learning</p>
</div>


<div class="input-group">
<label>Embarazos
<span class="tooltip">ⓘ
<span class="tooltiptext">Número total de embarazos registrados en el historial clínico.</span>
</span>
</label>
<input type="number" id="pregnancies">
</div>


<div class="input-group">
<label>Glucos
<span class="tooltip">ⓘ
<span class="tooltiptext">Nivel de glucosa en sangre obtenido mediante análisis clínico.</span>
</span>
</label>
<input type="number" id="glucose">
</div>


<div class="input-group">
<label>Presión arterial
<span class="tooltip">ⓘ
<span class="tooltiptext">Medición de presión sanguínea obtenida con un tensiómetro.</span>
</span>
</label>
<input type="number" id="blood_pressure">
</div>


<div class="input-group">
<label>Grosor de piel (Skin Thickness)
<span class="tooltip">ⓘ
<span class="tooltiptext">Medición del pliegue cutáneo usada para estimar grasa corporal.</span>
</span>
</label>
<input type="number" id="skin_thickness">
</div>


<div class="input-group">
<label>Insulina
<span class="tooltip">ⓘ
<span class="tooltiptext">Nivel de insulina en sangre medido mediante análisis clínico.</span>
</span>
</label>
<input type="number" id="insulin">
</div>


<div class="input-group">
<label>IMC
<span class="tooltip">ⓘ
<span class="tooltiptext">Índice de masa corporal calculado a partir de peso y altura.</span>
</span>
</label>
<input type="number" id="bmi">
</div>


<div class="input-group">
<label>Historial familiar (DPF)
<span class="tooltip">ⓘ
<span class="tooltiptext">Indicador estadístico del historial familiar de diabetes.</span>
</span>
</label>
<input type="number" step="0.01" id="dpf">
</div>


<div class="input-group">
<label>Edad
<span class="tooltip">ⓘ
<span class="tooltiptext">Edad del paciente en años.</span>
</span>
</label>
<input type="number" id="age">
</div>


<button onclick="calcularRiesgo()">Calcular Riesgo</button>

<div id="resultado" class="resultado"></div>


<div class="footer">
Sistema académico – No sustituye diagnóstico médico
</div>

</div>

<script src="script.js"></script>

</body>
</html>
